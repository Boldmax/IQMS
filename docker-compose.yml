version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: iqms_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: iqms_saas_db
      POSTGRES_USER: iqms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iqms_secure_2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iqms_user -d iqms_saas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: iqms_saas_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iqms_saas_db
      DB_USER: iqms_user
      DB_PASSWORD: ${DB_PASSWORD:-iqms_secure_2025}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_minimum_32_chars}
      JWT_EXPIRES_IN: 8h
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      # Uncomment when Stripe is configured:
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${API_URL:-http://localhost:5000}
    container_name: iqms_saas_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
